# Nginx config for Proca (blue-green deployment)
#
# Two instances per environment:
#   staging: blue=4000  green=4010
#   live:    blue=4001  green=4011
#
# Only one is the active upstream at a time; the other is backup.
# The deploy-bluegreen script swaps which port is primary.

# ============ STAGING ============
# upstream proca_staging {
#     server 127.0.0.1:4000;
#     server 127.0.0.1:4010 backup;
# }

# ============ LIVE ============
upstream proca_live {
    server 127.0.0.1:4001;
    server 127.0.0.1:4011 backup;
}

# ================================================================

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/ssl/certs/your-domain.pem;
    ssl_certificate_key /etc/ssl/private/your-domain.key;

    # Health check — no logging, fast timeout
    location /health {
        proxy_pass http://proca_live;
        proxy_set_header Host $host;
        access_log off;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # All other traffic
    location / {
        proxy_pass http://proca_live;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Absinthe subscriptions)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;

        # Increase buffer for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
