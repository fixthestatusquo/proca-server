# Nginx upstream config for Proca blue-green deployment
#
# Include this in your nginx site config (e.g., /etc/nginx/sites-available/proca).
#
# Two upstreams (blue and green) on ports 4000 and 4001.
# The ACTIVE_UPSTREAM variable controls which one receives traffic.
# nginx -s reload after switching the variable to commit the change.
#
# During a deploy:
#   1. Build new release
#   2. Start the standby instance (e.g., green if blue is active)
#   3. nginx -s reload  (traffic switches to green)
#   4. Stop the old instance (blue)

upstream proca_backend {
    server 127.0.0.1:4000 max_fails=3 fail_timeout=10s;
}

# Uncomment this block and comment the one above to switch to green:
# upstream proca_backend {
#     server 127.0.0.1:4001 max_fails=3 fail_timeout=10s;
# }

# Alternative: use both with backup (avoids editing the config).
# One instance is primary, the other is backup (no traffic unless primary fails).
# The deploy script starts the backup, then does nginx -s reload to swap roles.
#
# upstream proca_backend {
#     server 127.0.0.1:4000 max_fails=3 fail_timeout=10s;
#     server 127.0.0.1:4001 max_fails=3 fail_timeout=10s backup;
# }

server {
    listen 80;
    server_name your-domain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/ssl/certs/your-domain.pem;
    ssl_certificate_key /etc/ssl/private/your-domain.key;

    # Health check endpoint — nginx can probe this directly
    location /health {
        proxy_pass http://proca_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
        # Short timeout for health checks
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # All other traffic
    location / {
        proxy_pass http://proca_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Absinthe subscriptions)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;

        # Increase buffer for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
